version: 2

project_name: statusline

builds:
  - binary: statusline
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^style:'
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999

homebrew_casks:
  - repository:
      owner: benjaminmikiten
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: statusline
    homepage: https://github.com/benjaminmikiten/statusline
    description: Claude Code statusline focused on prompt-cache cost visibility
    binaries:
      - statusline
    hooks:
      pre:
        install: |
          system_command "/usr/bin/xattr", args: ["-cr", "#{staged_path}/statusline"]
